version: "3"

tasks:
  build:
    desc: "Build the feed-forge binary"
    deps: [test, lint]
    cmds:
      - mkdir -p build
      - go build -o build/feed-forge cmd/feed-forge/main.go

  test:
    desc: "Run tests"
    cmds:
      - go test ./...

  lint:
    desc: "Run linter and formatter"
    cmds:
      - goimports -w .
      - golangci-lint run
      - go vet ./...
      - go mod tidy

  clean:
    desc: "Clean build artifacts"
    cmds:
      - rm -rf build/
      - rm -f *.xml
      - rm -f *.db

  build-linux:
    desc: "Build for Linux AMD64"
    deps: [test, lint]
    cmds:
      - mkdir -p build
      - GOOS=linux GOARCH=amd64 go build -o build/feed-forge-linux cmd/feed-forge/main.go

  build-ci:
    desc: "Build for CI environment"
    cmds:
      - mkdir -p build
      - go build -o build/feed-forge cmd/feed-forge/main.go

  test-ci:
    desc: "Run tests with CI tags and coverage"
    cmds:
      - go test -tags=ci -cover -v ./...

  run-reddit:
    desc: "Run Reddit feed generation"
    deps: [build]
    cmds:
      - ./build/feed-forge reddit

  run-hackernews:
    desc: "Run Hacker News feed generation"
    deps: [build]
    cmds:
      - ./build/feed-forge hacker-news

  run-fingerpori:
    desc: "Run Fingerpori feed generation"
    deps: [build]
    cmds:
      - ./build/feed-forge fingerpori

  preview-reddit:
    desc: "Preview Reddit feed items interactively"
    deps: [build]
    cmds:
      - ./build/feed-forge preview reddit

  preview-hackernews:
    desc: "Preview Hacker News feed items interactively"
    deps: [build]
    cmds:
      - ./build/feed-forge preview hacker-news

  preview-fingerpori:
    desc: "Preview Fingerpori feed items interactively"
    deps: [build]
    cmds:
      - ./build/feed-forge preview fingerpori
  run-feissarimokat:
    desc: "Run Feissarimokat feed generation"
    deps: [build]
    cmds:
      - ./build/feed-forge feissarimokat

  preview-feissarimokat:
    desc: "Preview Feissarimokat feed items interactively"
    deps: [build]
    cmds:
      - ./build/feed-forge preview feissarimokat

  run-oglaf:
    desc: "Run Oglaf feed generation"
    deps: [build]
    cmds:
      - ./build/feed-forge oglaf

  update-golden:
    desc: "Update golden files when tests are in stable state"
    cmds:
      - go test -v ./... -update

  test-update:
    desc: "Refresh external test fixtures"
    cmds:
      - mkdir -p internal/oglaf/testdata internal/feissarimokat/testdata internal/hackernews/testdata
      - curl -L --fail --show-error --silent https://www.oglaf.com/feeds/rss/ -o internal/oglaf/testdata/rss_live_snapshot.xml
      - curl -L --fail --show-error --silent https://static.feissarimokat.com/dynamic/latest/posts.rss -o internal/feissarimokat/testdata/feed_live_snapshot.rss
      - |
        post_url=$$(python - <<'PY'
        import pathlib, re
        rss = pathlib.Path('internal/feissarimokat/testdata/feed_live_snapshot.rss').read_text()
        m = re.search(r'<link>(https://www\.feissarimokat\.com/[^<]+)</link>', rss)
        if not m:
            raise SystemExit('failed to find feissarimokat post link in RSS fixture')
        print(m.group(1))
        PY
        )
        curl -L --fail --show-error --silent "$$post_url" -o internal/feissarimokat/testdata/post_live_snapshot.html
      - curl -L --fail --show-error --silent 'https://hn.algolia.com/api/v1/search_by_date?tags=front_page&hitsPerPage=100' -o internal/hackernews/testdata/frontpage_live_snapshot.json
      - |
        item_id=$$(python - <<'PY'
        import json, pathlib
        data = json.loads(pathlib.Path('internal/hackernews/testdata/frontpage_live_snapshot.json').read_text())
        hits = data.get('hits') or []
        if not hits or 'objectID' not in hits[0]:
            raise SystemExit('failed to find Hacker News objectID in frontpage fixture')
        print(hits[0]['objectID'])
        PY
        )
        curl -L --fail --show-error --silent "https://hn.algolia.com/api/v1/items/$$item_id" -o internal/hackernews/testdata/item_live_snapshot.json

  publish:
    desc: "Copy binary to remote Linux server"
    deps: [build-linux]
    cmds:
      - scp build/feed-forge-linux ${PUBLISH_DESTINATION}

  help:
    desc: "Show available tasks"
    cmds:
      - task --list
