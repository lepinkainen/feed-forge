# Feed-Forge Configuration Example
#
# This file demonstrates the configuration format for feed-forge.
# Copy this to 'config.yaml' and customize for your needs.
#
# Note: CLI flags always override configuration file values.
# Field names use kebab-case to match CLI flag names.

# Base output directory for all generated feeds (optional).
# Provider outfile paths are relative to this directory.
# Absolute outfile paths are not affected.
# When set, bulletin-publish also writes HTML pages to <output-dir>/html/
# (a dated archive page plus a stable bulletin-latest.html), and the generated
# feed index links to the latest page.
output-dir: ""

# Public base URL for generated feeds in feeds.opml.
feed-base-url: "https://example.com/rss/"

# Directory for cache databases (optional).
# Defaults to $XDG_CACHE_HOME/feed-forge or ~/.cache/feed-forge.
cache-dir: ""

# Shared Anthropic (Claude) credentials, used by any processor that summarises
# via Claude (currently the bulletin pipeline). Prefer the ANTHROPIC_API_KEY
# environment variable — if you set the key here instead, chmod 600 this file and
# never commit it. Leave empty to use the env var.
anthropic:
  api-key: ""

# Reddit provider configuration
reddit:
  feed-id: "" # Required: Your Reddit feed ID (from https://www.reddit.com/prefs/feeds/)
  username: "" # Required: Your Reddit username
  min-score: 50 # Minimum post score to include
  min-comments: 10 # Minimum comment count to include
  outfile: reddit.xml # Output file path
  interval: 15m # Minimum time between regenerations (default: 15m)
  proxy-url: "" # Optional: Proxy URL for feed API (e.g. https://your-server.com/reddit-proxy.php)
  proxy-secret: "" # Optional: Shared secret for proxy authentication (X-Proxy-Secret header)
  og-proxy-url: "" # Optional: Proxy URL for OpenGraph fetching from reddit (e.g. https://your-server.com/reddit-og-proxy.php)

# Hacker News provider configuration
hackernews:
  min-points: 50 # Minimum points threshold
  limit: 30 # Maximum number of items
  outfile: hackernews.xml
  interval: 15m

# Fingerpori provider configuration
fingerpori:
  limit: 100 # Maximum number of items
  outfile: fingerpori.xml
  interval: 24h # Daily comic, no need to check often

# Feissarimokat provider configuration
feissarimokat:
  outfile: feissarimokat.xml
  interval: 24h # Weekly updates, daily check is plenty

# Oglaf provider configuration
oglaf:
  outfile: oglaf.xml
  interval: 24h # Weekly comic, daily check is plenty

# Tildes provider configuration
# Use either topic for one group or topics for multiple groups.
tildes:
  topic: tech
  topics: [] # e.g. [tech, science, games]
  outfile: tildes.xml
  interval: 30m

# YouTube provider configuration
# Shorts are filtered out by default when entries link to /shorts/<video_id>.
youtube:
  feed-urls: [] # e.g. [https://www.youtube.com/feeds/videos.xml?channel_id=UCT5C7yaO3RVuOgwP8JVAujQ]
  channel-ids: [] # e.g. [UCT5C7yaO3RVuOgwP8JVAujQ]
  limit: 30
  include-shorts: false
  outfile: youtube.xml
  interval: 30m

# Bulletin aggregator (separate code path, not a registry provider).
# Polls high-frequency source feeds, extracts full text, de-duplicates near
# -identical stories via SimHash, then publishes an LLM-summarised digest as a
# single Atom entry. Runs as two cron steps + one debug command:
#   */30 * * * *  feed-forge bulletin-fetch      # accumulate items all day
#   0 8,18 * * *  feed-forge bulletin-publish -o bulletin.xml
#   feed-forge bulletin-summarize                # debug: print digest, no writes
# Requires an Anthropic API key: set `anthropic.api-key` above or the
# ANTHROPIC_API_KEY environment variable.
bulletin:
  model: claude-haiku-4-5 # Anthropic model used for summarisation
  simhash-threshold: 3 # Max Hamming distance (of 64) to treat stories as duplicates
  max-tokens: 4096 # Upper bound on the digest response
  prompt-file: "" # Optional: path to a prompt template override for iteration
  feeds:
    - url: https://arstechnica.com/feed/
      category: tech
    - url: https://www.theverge.com/rss/index.xml
      category: tech
